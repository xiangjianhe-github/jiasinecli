# Jiasine CLI 配置文件示例
# 复制到 ~/.jiasine/config.yaml 并根据需要修改

# 日志配置
log:
  level: info          # debug, info, warn, error
  format: text         # text, json
  output: stdout       # stdout, file
  file: ""             # 日志文件路径 (output=file 时有效)

# 后端服务配置
# 通过 HTTP/gRPC/进程方式调用的独立服务
services:
  # Python AI 服务示例
  ai-service:
    type: http
    address: "http://localhost:8001"
    health_check: "/health"
    timeout: 30
    description: "AI 推理服务 (Python)"

  # C# 业务服务示例
  business-api:
    type: http
    address: "http://localhost:5000"
    health_check: "/healthz"
    timeout: 10
    description: "业务 API 服务 (C#)"

  # Python 脚本 (进程调用) 示例
  data-processor:
    type: process
    command: "python"
    args: ["-m", "jiasine.processor"]
    workdir: "/opt/jiasine/python"
    env:
      PYTHONPATH: "/opt/jiasine/python"
    timeout: 60
    description: "数据处理工具 (Python)"

  # JavaScript (Node.js) 服务示例
  js-worker:
    type: http
    address: "http://localhost:9903"
    health_check: "/health"
    timeout: 15
    description: "JS 工作服务 (Node.js)"

  # TypeScript 服务示例
  ts-api:
    type: http
    address: "http://localhost:9904"
    health_check: "/health"
    timeout: 15
    description: "TS API 服务 (tsx)"

  # Java 服务示例
  java-engine:
    type: http
    address: "http://localhost:9905"
    health_check: "/health"
    timeout: 20
    description: "业务引擎 (Java)"

# 动态库桥接配置
# 通过 FFI 调用的原生动态库
bridges:
  # C 原生库示例
  core-engine:
    type: c
    path: "libs/core_engine"
    platform:
      windows: "libs/core_engine.dll"
      darwin: "libs/libcore_engine.dylib"
      linux: "libs/libcore_engine.so"
    functions:
      - "init"
      - "process"
      - "cleanup"

  # Rust 库示例
  crypto-lib:
    type: rust
    path: "libs/jiasine_crypto"
    platform:
      windows: "libs/jiasine_crypto.dll"
      darwin: "libs/libjiasine_crypto.dylib"
      linux: "libs/libjiasine_crypto.so"
    functions:
      - "encrypt"
      - "decrypt"
      - "hash"

  # .NET Native AOT 示例
  dotnet-core:
    type: dotnet
    path: "libs/JiasineCore"
    platform:
      windows: "libs/JiasineCore.dll"
      darwin: "libs/libJiasineCore.dylib"
      linux: "libs/libJiasineCore.so"
    functions:
      - "Initialize"
      - "Execute"
      - "GetStatus"

  # Objective-C 库示例
  objc-bridge:
    type: objc
    path: "libs/jiasine_objc"
    platform:
      windows: "libs/jiasine_objc.dll"
      darwin: "libs/libjiasine_objc.dylib"
      linux: "libs/libjiasine_objc.so"
    functions:
      - "add"
      - "reverse_string"
      - "health"

# 插件配置
plugins:
  dir: ""              # 插件目录 (默认 ~/.jiasine/plugins)
  auto_load: true      # 是否自动加载插件

# AI 大模型配置
# 支持多个模型服务商，通过 active 指定当前使用的服务商
ai:
  active: openai       # 当前激活的服务商: openai, claude, gemini, qwen, deepseek

  # 服务商配置
  providers:
    openai:
      name: openai
      api_key: "sk-xxxx"                           # OpenAI API Key
      base_url: "https://api.openai.com/v1"        # 可替换为代理地址
      model: "gpt-4o"                               # 默认模型: gpt-4o, gpt-4o-mini, o1, o3-mini
      enabled: true

    claude:
      name: claude
      api_key: "sk-ant-xxxx"                       # Anthropic API Key
      base_url: "https://api.anthropic.com"         # Anthropic API 地址
      model: "claude-sonnet-4-20250514"              # 默认模型: claude-sonnet-4-20250514, claude-opus-4-20250514
      enabled: true

    gemini:
      name: gemini
      api_key: "AIza-xxxx"                          # Google AI API Key
      base_url: "https://generativelanguage.googleapis.com/v1beta"  # Gemini API 地址
      model: "gemini-2.5-pro"                       # 默认模型: gemini-2.5-pro, gemini-2.5-flash
      enabled: true

    qwen:
      name: qwen
      api_key: "sk-xxxx"                            # 通义千问 API Key
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # 阿里云 DashScope
      model: "qwen-max"                             # 默认模型: qwen-max, qwen-plus, qwen-turbo
      enabled: true

    deepseek:
      name: deepseek
      api_key: "sk-xxxx"                            # DeepSeek API Key
      base_url: "https://api.deepseek.com/v1"       # DeepSeek API 地址
      model: "deepseek-chat"                        # 默认模型: deepseek-chat, deepseek-coder, deepseek-reasoner
      enabled: true

  # Agent (智能体) 配置
  agents:
    dir: ""            # Agent 定义目录 (默认 ~/.jiasine/agents)
    # 内置 Agent: assistant, coder, translator, devops
    # 自定义 Agent 放入 agents 目录，JSON 格式

  # Skills (技能) 配置
  skills:
    dir: ""            # Skills 定义目录 (默认 ~/.jiasine/skills)
    # 内置 Skills: code-review, sql-expert, api-designer, git-helper, doc-writer
    # 自定义 Skill 放入 skills 目录，JSON 格式
